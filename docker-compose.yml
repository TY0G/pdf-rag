services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pdf_scan_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pdf_scan}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pdf_scan}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: pdf_scan_backend
    env_file:
      - .env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/pdf_scan}
      POSTGRES_DB: ${POSTGRES_DB:-pdf_scan}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      APP_NAME: ${APP_NAME:-PDF 文档扫描项目}
      DEBUG: ${DEBUG:-true}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-720}
      STORAGE_ROOT: /app/storage
      UPLOAD_DIR: /app/storage/uploads
      PREVIEW_DIR: /app/storage/previews
      TOP_K: ${TOP_K:-5}
      CHUNK_SIZE: ${CHUNK_SIZE:-500}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-80}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - storage_data:/app/storage

  frontend:
    build:
      context: ./frontend
    container_name: pdf_scan_frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
  storage_data:
